name: just-ai layers

on:
  pull_request:
    paths:
      - "crates/just-ai/**"
      - "apps/just-ai-gui/**"
      - "apps/just-ai-mcp/**"
      - "agent/**"
      - "docs/architecture/**"
      - ".github/workflows/just-ai.yaml"
  push:
    branches: [master]
    paths:
      - "crates/just-ai/**"
      - "apps/just-ai-gui/**"
      - "apps/just-ai-mcp/**"
      - "agent/**"
      - "docs/architecture/**"

jobs:
  core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: 1.89.0
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      - run: cargo clippy --package just-ai --all-targets -- -D warnings
      - run: cargo test --package just-ai
      - run: cargo fmt --manifest-path apps/just-ai-mcp/Cargo.toml -- --check
      - run: cargo clippy --manifest-path apps/just-ai-mcp/Cargo.toml --all-targets --locked -- -D warnings
      - run: cargo test --manifest-path apps/just-ai-mcp/Cargo.toml --locked

  windows-core:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: 1.89.0
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --package just-ai --all-targets -- -D warnings
      - run: cargo test --package just-ai

  desktop:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: apps/just-ai-gui
    steps:
      - uses: actions/checkout@v6
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: 1.89.0
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/just-ai-gui/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: cargo check --manifest-path src-tauri/Cargo.toml --locked
